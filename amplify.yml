version: 1
frontend:
  phases:
    build:
      commands:
        - |
          cat > config.js << CONFIGEOF
          const CONFIG = {
            companionProvider: '${COMPANION_PROVIDER}',
            companionOpenaiKey: '${COMPANION_OPENAI_KEY}',
            companionProviderKey: '${COMPANION_PROVIDER_KEY}',
            judgeOpenaiKey: '${JUDGE_OPENAI_KEY}',
            judgeGeminiKey: '${JUDGE_GEMINI_KEY}',
          };
          CONFIGEOF
  artifacts:
    baseDirectory: /
    files:
      - index.html
      - config.js
  cache:
    paths: []
